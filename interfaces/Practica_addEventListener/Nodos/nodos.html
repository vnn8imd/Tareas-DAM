<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla de Recursos con Depuración</title>
    <script src="nodos-script.js" defer></script>
    <style>
        /* Estilos CSS básicos para la tabla */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        table {
            border-collapse: collapse;
        }
        td {
            transition: background-color 0.3s;
            border: 1px solid #ccc; /* Aseguramos que la celda tenga borde */
            padding: 15px;
            text-align: center;
            width: 180px;
        }
        td:hover {
            background-color: #f0f0f0;
        }
        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h3>Practica Nodos</h3>
</body>
</html>
