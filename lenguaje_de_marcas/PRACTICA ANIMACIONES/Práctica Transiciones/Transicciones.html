<!DOCTYPE html>
<html>
<head>
    <title>Imágenes con Transición (Clase)</title>
    <style>
        body {
            font-family: 'Times New Roman', sans-serif;
            text-align: center;
        }
        .image-container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        /* Clase CSS para las imágenes */
        .image {
            width: 300px;
            height: 300px;
            border: 3px solid #333;
            border-radius: 8px;
            margin: 10px;
            transition: opacity 0.5s, width 0.5s, height 0.5s, border-radius 0.5s;
        }

        /* Efecto cuando el cursor pasa sobre la imagen */
        .image:hover {
            opacity: 0.7;
            width: 250px;
            height: 250px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <h1>Práctica de Transicciones</h1>
    <p>Tres imágenes que tienen transiciones de propiedades (Con clase).</p>

    <div class="image-container">
        <img src="Transicción_Foto1.jpg" alt="Café-1" class="image">
        <img src="Transicción_Foto2.jpg" alt="Café-2" class="image">
        <img src="Transicción_Foto3.jpg" alt="Café-3" class="image">
    </div>
</body>
</html>
