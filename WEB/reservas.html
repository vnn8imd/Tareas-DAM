<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/css1.css">
    <link rel="icon" type="image/png" href="img/favicon.png">
</head>
<body>
    <header class="main-header">
        <nav class="main-nav">
            <div class="logo-container">
                <a href="index.html"><img src="img/logo.png" alt="Logo"></a>
            </div>
            <ul class="nav-links">
                <li><a href="menu.html" class="nav-button">MENÚ</a></li>
                <li><a href="galeria.html" class="nav-button">GALERÍA</a></li>
                <li><a href="reservas.html" class="nav-button active">RESERVAS</a></li>
                <li><a href="takeaway.html" class="nav-button">TAKE AWAY</a></li>
                <li><a href="donde_estamos.html" class="nav-button">DÓNDE ESTAMOS</a></li>
                <li><a href="contacto.html" class="nav-button">CONTACTO</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="formulario-container">
            <h2>Haz tu reserva</h2>
            <form action="gracias.html" method="post">
                <div class="campo">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="campo">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="campo">
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" required>
                </div>

                <div class="campo">
                    <label for="fecha">Fecha de la reserva:</label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>

                <div class="campo">
                    <label for="mensaje">Mensaje adicional:</label>
                    <textarea id="mensaje" name="mensaje" rows="4"></textarea>
                </div>

                <button type="submit" class="btn-enviar">Confirmar Reserva</button>
            </form>
        </section>
    </main>

    <footer>
        <div id="links-pie">
            <a href="redes-sociales.html">REDES SOCIALES</a>
            <a href="politica-cookies.html">POLÍTICA DE COOKIES</a>
            <a href="aviso-legal.html">AVISO LEGAL</a>
        </div>
        <p>© 2025 Veronica Nicolas. 1º DAM</p>
    </footer>                                    
</body>
</html>
